services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: driveprep
    volumes:
      - driveprep_pgdata:/var/lib/postgresql/data

volumes:
  driveprep_pgdata:
